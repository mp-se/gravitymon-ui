name: PlatformIO CI

on: 
  pull_request:
  push:
    branches: 
      - main
      - dev

jobs:
  vue-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VITE_APP_REGISTER_APIKEY: ${{ secrets.REGISTER_APIKEY }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      
      - run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --tags
          REV=`git rev-parse HEAD | rev | cut -c 1-6 | rev`
          TAG=`git tag --sort=creatordate | tail -1`
          echo "VITE_APP_BUILD=..$REV" >> .env
          echo "VITE_APP_VERSION=$TAG" >> .env
          cat .env

      - run: |
          rm -rf node_modules package-lock.json
          npm install
          npm run build 
                
      - uses: EndBug/add-and-commit@v10
        with:
          add: 'dist'
          author_name: GitHub Action
          author_email: mp-se@noreply.github.com
          default_author: github_actor
          message: 'GitHub Action Build'
          pathspec_error_handling: ignore

          